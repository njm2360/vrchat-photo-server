<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <title>アップロード済み画像一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/dark.css" />
    <style>
        .table {
            --bs-table-color: #e0e0e0;
            --bs-table-bg: #1a1a1a;
            --bs-table-border-color: #333;
            --bs-table-hover-color: #e0e0e0;
            --bs-table-hover-bg: #222;
            color: #e0e0e0;
        }

        .table thead th {
            background-color: #1e1e1e;
            border-color: #444;
            color: #aaa;
            font-weight: 600;
        }

        .table tbody td {
            background-color: #1a1a1a;
            border-color: #333;
            vertical-align: middle;
            color: #e0e0e0;
        }

        .table tbody tr:hover td {
            background-color: #222;
        }

        .table tbody tr.expired td {
            opacity: 0.5;
        }

        .badge-expired {
            background-color: #6c757d;
            color: #fff;
        }

        .badge-active {
            background-color: #198754;
            color: #fff;
        }

        .form-control {
            color: #e0e0e0 !important;
            background-color: transparent !important;
            border-color: #555 !important;
        }

        .form-control:focus {
            color: #e0e0e0 !important;
            background-color: #1a1a1a !important;
            border-color: #0d6efd !important;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, .25);
        }

        .thumb {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #444;
        }

        .thumb-expired {
            filter: grayscale(100%);
        }

        .filename-cell {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #loadingMsg {
            color: #888;
        }

        .pagination .page-link {
            background-color: #1e1e1e;
            border-color: #444;
            color: #aaa;
        }

        .pagination .page-item.active .page-link {
            background-color: #0d6efd;
            border-color: #0d6efd;
            color: #fff;
        }

        .pagination .page-item.disabled .page-link {
            background-color: #1a1a1a;
            border-color: #333;
            color: #555;
        }

        .pagination .page-link:hover {
            background-color: #2a2a2a;
            color: #e0e0e0;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">ImagePad用画像リサイズツール</span>
            <div class="d-flex align-items-center gap-3">
                <a href="/upload.html" class="nav-link">アップロード</a>
                <a href="/images.html" class="nav-link active">画像一覧</a>
                <button id="logoutBtn" class="btn btn-outline-danger btn-sm">
                    ログアウト
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">アップロード済み画像</h5>
            <button id="refreshBtn" class="btn btn-outline-secondary btn-sm">
                更新
            </button>
        </div>

        <div id="loadingMsg" class="text-center py-5">読み込み中...</div>
        <div id="emptyMsg" class="text-center py-5 text-muted d-none">
            アップロードされた画像はありません
        </div>
        <div id="errorMsg" class="text-center py-5 text-danger d-none">
            データの取得に失敗しました
        </div>

        <div id="tableWrapper" class="d-none">
            <div class="table-responsive">
                <table class="table table-sm align-middle">
                    <thead>
                        <tr>
                            <th style="width: 56px"></th>
                            <th>ファイル名</th>
                            <th>サイズ (px)</th>
                            <th>容量</th>
                            <th>アップロード日時</th>
                            <th>有効期限</th>
                            <th>状態</th>
                            <th>URL</th>
                            <th style="width:64px"></th>
                        </tr>
                    </thead>
                    <tbody id="imageTableBody"></tbody>
                </table>
            </div>
            <div class="text-muted small mt-2" id="countLabel"></div>
            <nav id="pagination" class="mt-3 d-none" aria-label="ページ切替">
                <ul class="pagination pagination-sm justify-content-center" id="paginationList"></ul>
            </nav>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function formatBytes(bytes) {
            if (bytes >= 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + " MB";
            if (bytes >= 1024) return (bytes / 1024).toFixed(1) + " KB";
            return bytes + " B";
        }

        function formatDate(isoStr) {
            if (!isoStr) return "-";
            const d = new Date(isoStr);
            return d.toLocaleString("ja-JP", {
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
                timeZone: "Asia/Tokyo",
            });
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        const PAGE_SIZE = 10;
        let currentOffset = 0;
        let currentTotal = 0;

        async function loadImages(offset = 0) {
            const loadingMsg = document.getElementById("loadingMsg");
            const emptyMsg = document.getElementById("emptyMsg");
            const errorMsg = document.getElementById("errorMsg");
            const tableWrapper = document.getElementById("tableWrapper");
            const tbody = document.getElementById("imageTableBody");
            const countLabel = document.getElementById("countLabel");
            const pagination = document.getElementById("pagination");

            loadingMsg.classList.remove("d-none");
            emptyMsg.classList.add("d-none");
            errorMsg.classList.add("d-none");
            tableWrapper.classList.add("d-none");
            pagination.classList.add("d-none");

            try {
                const res = await fetch(`/image/list?n=${PAGE_SIZE}&offset=${offset}`);
                if (res.status === 401) {
                    window.location.href = "/login.html";
                    return;
                }
                if (!res.ok) throw new Error("fetch failed");

                const data = await res.json();
                loadingMsg.classList.add("d-none");
                currentOffset = data.offset;
                currentTotal = data.total;

                if (data.total === 0) {
                    emptyMsg.classList.remove("d-none");
                    return;
                }

                tbody.innerHTML = "";
                for (const img of data.items) {
                    const tr = document.createElement("tr");
                    if (img.expired) tr.classList.add("expired");

                    const thumbSrc = escapeHtml(img.thumb_url);
                    const thumbHtml = img.expired
                        ? `<img class="thumb thumb-expired" src="${thumbSrc}" alt="" loading="lazy" onerror="this.style.display='none'">`
                        : `<a href="${escapeHtml(img.url)}" target="_blank"><img class="thumb" src="${thumbSrc}" alt="" loading="lazy" onerror="this.style.display='none'"></a>`;

                    const statusBadge = img.expired
                        ? `<span class="badge badge-expired">期限切れ</span>`
                        : `<span class="badge badge-active">有効</span>`;

                    const urlCell = img.expired
                        ? `<span class="text-muted small">${escapeHtml(img.stored_filename)}</span>`
                        : `<div class="d-flex align-items-center gap-1" style="flex-wrap:nowrap;">
                   <input type="text" class="form-control form-control-sm bg-transparent text-light border-secondary url-input" value="${escapeHtml(img.url)}" readonly style="font-size:0.75rem; cursor:pointer; min-width:0;">
                   <button class="btn btn-outline-secondary btn-sm copy-btn flex-shrink-0" data-url="${escapeHtml(img.url)}" style="white-space:nowrap;">コピー</button>
                 </div>`;

                    tr.dataset.filename = img.stored_filename;
                    tr.innerHTML = `
              <td>${thumbHtml}</td>
              <td class="filename-cell" title="${escapeHtml(img.orig_filename)}">${escapeHtml(img.orig_filename)}</td>
              <td>${img.width} × ${img.height}</td>
              <td>${formatBytes(img.size_bytes)}</td>
              <td style="white-space:nowrap">${formatDate(img.uploaded_at)}</td>
              <td style="white-space:nowrap">${formatDate(img.expires_at)}</td>
              <td>${statusBadge}</td>
              <td>${urlCell}</td>
              <td><button class="btn btn-outline-danger btn-sm delete-btn" data-filename="${escapeHtml(img.stored_filename)}">削除</button></td>
            `;
                    tbody.appendChild(tr);
                }

                const start = data.offset + 1;
                const end = Math.min(data.offset + data.n, data.total);
                countLabel.textContent = `全 ${data.total} 件中 ${start}〜${end} 件を表示`;

                renderPagination(data.offset, data.n, data.total);
                tableWrapper.classList.remove("d-none");
            } catch {
                loadingMsg.classList.add("d-none");
                errorMsg.classList.remove("d-none");
            }
        }

        function renderPagination(offset, n, total) {
            const pagination = document.getElementById("pagination");
            const list = document.getElementById("paginationList");

            if (total <= n) {
                pagination.classList.add("d-none");
                return;
            }

            const totalPages = Math.ceil(total / n);
            const currentPage = Math.floor(offset / n) + 1;

            list.innerHTML = "";

            const addItem = (label, targetOffset, disabled, active) => {
                const li = document.createElement("li");
                li.className = `page-item${disabled ? " disabled" : ""}${active ? " active" : ""}`;
                const a = document.createElement("a");
                a.className = "page-link";
                a.href = "#";
                a.textContent = label;
                if (!disabled && !active) {
                    a.addEventListener("click", (e) => {
                        e.preventDefault();
                        loadImages(targetOffset);
                        window.scrollTo(0, 0);
                    });
                }
                li.appendChild(a);
                list.appendChild(li);
            };

            addItem("«", offset - n, offset === 0, false);

            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

            if (startPage > 1) {
                addItem("1", 0, false, false);
                if (startPage > 2) {
                    const li = document.createElement("li");
                    li.className = "page-item disabled";
                    li.innerHTML = `<span class="page-link">…</span>`;
                    list.appendChild(li);
                }
            }
            for (let p = startPage; p <= endPage; p++) {
                addItem(String(p), (p - 1) * n, false, p === currentPage);
            }
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    const li = document.createElement("li");
                    li.className = "page-item disabled";
                    li.innerHTML = `<span class="page-link">…</span>`;
                    list.appendChild(li);
                }
                addItem(String(totalPages), (totalPages - 1) * n, false, false);
            }

            addItem("»", offset + n, offset + n >= total, false);
            pagination.classList.remove("d-none");
        }

        // URLコピー
        document.addEventListener("click", async (e) => {
            const btn = e.target.closest(".copy-btn");
            if (!btn) return;
            const url = btn.dataset.url;
            try {
                await navigator.clipboard.writeText(url);
                btn.textContent = "コピー済";
                setTimeout(() => { btn.textContent = "コピー"; }, 2000);
            } catch { }
        });

        // URL入力クリックで全選択
        document.addEventListener("click", (e) => {
            if (e.target.classList.contains("url-input")) {
                e.target.select();
            }
        });

        // 削除ボタン
        document.addEventListener("click", async (e) => {
            const btn = e.target.closest(".delete-btn");
            if (!btn) return;
            const filename = btn.dataset.filename;
            if (!confirm(`「${filename}」を削除しますか？`)) return;

            btn.disabled = true;
            const res = await fetch(`/image/${encodeURIComponent(filename)}`, { method: "DELETE" });
            if (res.status === 401) {
                window.location.href = "/login.html";
                return;
            }
            if (res.ok) {
                const tr = btn.closest("tr");
                tr.remove();
                currentTotal--;
                const countLabel = document.getElementById("countLabel");
                const start = currentOffset + 1;
                const end = Math.min(currentOffset + PAGE_SIZE, currentTotal);
                countLabel.textContent = currentTotal === 0
                    ? "全 0 件"
                    : `全 ${currentTotal} 件中 ${start}〜${end} 件を表示`;
                if (currentTotal === 0) {
                    document.getElementById("tableWrapper").classList.add("d-none");
                    document.getElementById("emptyMsg").classList.remove("d-none");
                }
            } else {
                btn.disabled = false;
                alert("削除に失敗しました");
            }
        });

        // 更新ボタン
        document.getElementById("refreshBtn").addEventListener("click", () => loadImages(currentOffset));

        // ログアウト
        document.getElementById("logoutBtn").addEventListener("click", async () => {
            await fetch("/auth/logout", { method: "POST" });
            window.location.href = "/login.html";
        });

        loadImages();
    </script>
</body>

</html>
