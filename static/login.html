<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <title>ログイン</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/dark.css" />
</head>

<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-sm" style="max-width: 400px; width: 100%">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">ログイン</h3>
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">ユーザー名</label>
                        <input type="text" class="form-control" id="username" required />
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">パスワード</label>
                        <input type="password" class="form-control" id="password" required />
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        ログイン
                    </button>
                </form>
                <div id="errorMsg" class="text-danger mt-3 d-none text-center">
                    ログインに失敗しました
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (optional for components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document
            .getElementById("loginForm")
            .addEventListener("submit", async (e) => {
                e.preventDefault();

                const btn = e.target.querySelector("button[type=submit]");
                const errorMsg = document.getElementById("errorMsg");

                errorMsg.classList.add("d-none");
                btn.disabled = true;

                try {
                    const res = await fetch("/auth/login", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            username: document.getElementById("username").value,
                            password: document.getElementById("password").value,
                        }),
                    });

                    if (res.ok) {
                        window.location.href = "/upload.html";
                    } else {
                        if (res.status === 429) {
                            errorMsg.textContent = "試行回数が多すぎます。しばらく待ってから再試行してください。";
                        } else {
                            errorMsg.textContent = "ログインに失敗しました";
                        }
                        errorMsg.classList.remove("d-none");
                        btn.disabled = false;
                    }
                } catch {
                    errorMsg.textContent = "ネットワークエラーが発生しました";
                    errorMsg.classList.remove("d-none");
                    btn.disabled = false;
                }
            });
    </script>
</body>

</html>
