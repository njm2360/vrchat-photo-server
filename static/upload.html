<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <title>画像アップロード</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/dark.css" />
    <style>
        #dropOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 110, 253, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #fff;
            opacity: 0;
            z-index: 9999;
            pointer-events: none;
            transition: opacity 0.1s ease-in-out;
        }

        #dropOverlay.show {
            opacity: 1;
            pointer-events: all;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">ImagePad用画像リサイズツール</span>
            <div class="d-flex align-items-center gap-3">
                <a href="/upload.html" class="nav-link active">アップロード</a>
                <a href="/images.html" class="nav-link">画像一覧</a>
                <button id="logoutBtn" class="btn btn-outline-danger btn-sm">
                    ログアウト
                </button>
            </div>
        </div>
    </nav>

    <div id="dropOverlay">ここにドロップしてアップロード</div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <form id="uploadForm">
                            <div class="mb-3">
                                <label for="file" class="form-label">画像ファイル</label>
                                <input type="file" class="form-control" id="file" name="file"
                                    accept=".jpg,.jpeg,.png,.gif,.bmp,.webp,.tif,.tiff" required />
                            </div>
                            <div class="mb-3">
                                <label for="max_width" class="form-label">最大幅 (px)</label>
                                <input type="number" class="form-control" id="max_width" name="max_width" value="2048"
                                    min="1" max="2048" />
                            </div>
                            <div class="mb-3">
                                <label for="max_height" class="form-label">最大高 (px)</label>
                                <input type="number" class="form-control" id="max_height" name="max_height" value="2048"
                                    min="1" max="2048" />
                            </div>
                            <div class="mb-3">
                                <label for="rotate" class="form-label">回転（時計回り）</label>
                                <select class="form-select" id="rotate" name="rotate">
                                    <option value="0" selected>0°（回転なし）</option>
                                    <option value="90">90°</option>
                                    <option value="180">180°</option>
                                    <option value="270">270°</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="expire_days" class="form-label">有効期限 (日)</label>
                                <select class="form-select" id="expire_days" name="expire_days">
                                    <option value="1">1</option>
                                    <option value="3">3</option>
                                    <option value="5">5</option>
                                    <option value="7" selected>7</option>
                                    <option value="14">14</option>
                                    <option value="21">21</option>
                                    <option value="28">28</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                アップロード
                            </button>
                        </form>
                        <div id="errorMsg" class="text-danger mt-3 d-none text-center">
                            アップロードに失敗しました
                        </div>
                    </div>
                </div>

                <div id="result" class="mt-4 d-none">
                    <div class="card shadow-sm mt-3">
                        <div class="card-body text-center">
                            <h5 class="card-title">アップロード成功</h5>
                            <div class="input-group mb-3">
                                <input type="text" class="form-control text-nowrap" id="uploadedUrl" readonly
                                    style="cursor: pointer" />
                                <button class="btn btn-outline-primary" id="copyBtn" style="min-width: 140px">
                                    URLをコピー
                                </button>
                            </div>
                            <a id="previewLink" href="#" target="_blank">
                                <img id="previewImage" class="img-fluid rounded border" alt="uploaded image" />
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 要素の参照
        const dropOverlay = document.getElementById("dropOverlay");
        const fileInput = document.getElementById("file");
        const uploadForm = document.getElementById("uploadForm");
        const errorMsg = document.getElementById("errorMsg");
        const resultBox = document.getElementById("result");
        const urlInput = document.getElementById("uploadedUrl");
        const copyBtn = document.getElementById("copyBtn");
        const previewLink = document.getElementById("previewLink");
        const previewImage = document.getElementById("previewImage");
        let dragCounter = 0;

        // Drag & Dropイベント
        window.addEventListener("dragenter", (e) => {
            e.preventDefault();
            dragCounter++;
            dropOverlay.classList.add("show");
        });

        window.addEventListener("dragover", (e) => {
            e.preventDefault();
        });

        window.addEventListener("dragleave", (e) => {
            e.preventDefault();
            dragCounter--;
            if (dragCounter <= 0) {
                dropOverlay.classList.remove("show");
                dragCounter = 0;
            }
        });

        window.addEventListener("drop", (e) => {
            e.preventDefault();
            dropOverlay.classList.remove("show");
            dragCounter = 0;

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const file = files[0];
                if (file.type.startsWith("image/")) {
                    fileInput.files = files;
                } else {
                    alert("画像ファイルをドロップしてください");
                }
            }
        });

        // アップロード処理
        uploadForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const submitBtn = uploadForm.querySelector("button[type=submit]");
            errorMsg.classList.add("d-none");
            submitBtn.disabled = true;

            try {
                const formData = new FormData(uploadForm);
                formData.set("rotate", parseInt(formData.get("rotate"), 10));
                formData.set("max_width", parseInt(formData.get("max_width"), 10));
                formData.set("max_height", parseInt(formData.get("max_height"), 10));
                const res = await fetch("/image/upload", {
                    method: "POST",
                    body: formData,
                });

                if (!res.ok) {
                    if (res.status === 401) {
                        window.location.href = "/login.html";
                        return;
                    }
                    errorMsg.classList.remove("d-none");
                    submitBtn.disabled = false;
                    return;
                }

                const data = await res.json();

                fileInput.value = "";
                urlInput.value = data.url;
                previewLink.href = data.url;
                previewImage.src = data.thumb_url;

                resultBox.classList.remove("d-none");
                submitBtn.disabled = false;
            } catch {
                errorMsg.classList.remove("d-none");
                submitBtn.disabled = false;
            }
        });

        // URL入力クリックで全選択
        urlInput.addEventListener("click", () => {
            urlInput.select();
        });

        // コピー処理
        copyBtn.addEventListener("click", async () => {
            try {
                await navigator.clipboard.writeText(urlInput.value);
                copyBtn.textContent = "コピーしました";
                copyBtn.classList.remove("btn-outline-primary");
                copyBtn.classList.add("btn-primary");

                setTimeout(() => {
                    copyBtn.textContent = "URLをコピー";
                    copyBtn.classList.remove("btn-primary");
                    copyBtn.classList.add("btn-outline-primary");
                }, 2000);
            } catch (err) {
                console.error(err);
            }
        });

        // ログアウト処理
        document
            .getElementById("logoutBtn")
            .addEventListener("click", async () => {
                await fetch("/auth/logout", { method: "POST" });
                window.location.href = "/login.html";
            });

        // ロード時にフォーム初期化
        window.addEventListener("load", () => {
            uploadForm.reset();
            fileInput.value = "";
            resultBox.classList.add("d-none");
        });
    </script>
</body>

</html>
